name: Daivik Tracker

on:
  schedule:
    - cron: '*/30 * * * *'  # Fallback scheduler running every 30 minutes
  workflow_dispatch:      # Allow manual and external trigger (via cron-job.org / GitHub API)

permissions:
  contents: write         # Allows the workflow to commit log updates back to the repository

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Run Tracker Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python shopify_tracker_actions.py --url "https://daivik.in" --output-dir "."

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are differences to avoid committing empty runs
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update Daivik inventory cache [skip ci]"
            for i in {1..5}; do
              git push && break || {
                echo "Push failed. Pulling latest remote changes and retrying..."
                git pull --rebase origin main
              }
            done
          else
            echo "No inventory changes to commit."
          fi
